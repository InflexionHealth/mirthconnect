name: Sync from OpenIntegrationEngine/engine

on:
  schedule:
    - cron: '0 18 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch upstream
        run: |
          git remote add oie https://github.com/OpenIntegrationEngine/engine.git
          git fetch oie --tags

      - name: Mirror oie/main onto oie-main branch
        run: |
          git fetch origin refs/heads/oie-main:refs/remotes/origin/oie-main || true
          git push origin --force-with-lease refs/remotes/oie/main:refs/heads/oie-main
          git branch -f oie-main oie/main

      - name: Push new upstream release tags
        # ponytail: scoped to v* (OIE's release convention) — a blanket `--tags` pulls in
        # decades of legacy pre-fork tags, and GITHUB_TOKEN is hard-blocked by GitHub from
        # pushing any ref whose history touches .github/workflows/*, which several of those
        # ancient tags do. Widen only if OIE's tagging convention changes.
        run: git push origin 'refs/tags/v*:refs/tags/v*'

      - name: Open sync PR if oie-main is ahead of main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # main permanently carries the InflexionHealth README note on top of oie/main,
          # so SHA equality never holds — check ancestry (already-merged) instead.
          if git merge-base --is-ancestor oie-main origin/main; then
            echo "main already contains oie-main; nothing to sync."
            exit 0
          fi
          open_count=$(gh pr list --head oie-main --base main --state open --json number --jq 'length')
          if [ "$open_count" = "0" ]; then
            gh pr create --head oie-main --base main --fill
          else
            echo "Sync PR already open for oie-main -> main; push already updated it."
          fi
